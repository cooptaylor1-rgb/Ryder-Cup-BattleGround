[build]
builder = "nixpacks"
watchPatterns = ["golf-ryder-cup-web/**"]
buildCommand = "cd golf-ryder-cup-web && pnpm run deploy:railway"

[deploy]
healthcheckPath = "/api/health/live"
healthcheckTimeout = 100
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
startCommand = "cd golf-ryder-cup-web && HOSTNAME=0.0.0.0 pnpm start"
numReplicas = 1

[service]
internalPort = 3000
